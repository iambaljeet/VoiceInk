# VoiceInk — Update Website Download Links
# Fetches the latest GitHub Release, extracts direct download URLs for
# macOS and Windows artifacts, updates docs/index.html, and pushes to main.
#
# Can be triggered:
#   1. Manually via workflow_dispatch
#   2. Automatically by the Release workflow via workflow_call

name: Update Website

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to use (leave empty for latest)'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag to use'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  update-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release_tag }}"
          REPO_URL="https://github.com/${{ github.repository }}"

          if [ -z "$TAG" ]; then
            echo "No tag specified — fetching latest release..."
            TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Strip 'v' prefix for filename
          VER="${TAG#v}"

          # Construct direct download URLs from known naming convention
          MAC_URL="${REPO_URL}/releases/download/${TAG}/VoiceInk-${VER}-macOS-arm64.dmg"
          WIN_URL="${REPO_URL}/releases/download/${TAG}/VoiceInk-${VER}-Windows-x64-Setup.exe"

          # Verify assets exist via API (non-blocking)
          RELEASE_JSON=$(gh api repos/${{ github.repository }}/releases/tags/$TAG 2>/dev/null || echo '{}')
          ASSET_COUNT=$(echo "$RELEASE_JSON" | jq '.assets | length' 2>/dev/null || echo 0)
          echo "Release $TAG has $ASSET_COUNT assets"

          # If API has assets, prefer the actual browser_download_url
          if [ "$ASSET_COUNT" -gt 0 ]; then
            API_MAC=$(echo "$RELEASE_JSON" | jq -r '[.assets[] | select(.name | test("macOS.*arm64.*\\.(dmg|zip)$"))] | first | .browser_download_url // empty')
            API_WIN=$(echo "$RELEASE_JSON" | jq -r '[.assets[] | select(.name | test("Windows.*x64.*Setup.*\\.exe$"))] | first | .browser_download_url // empty')
            [ -n "$API_MAC" ] && MAC_URL="$API_MAC"
            [ -n "$API_WIN" ] && WIN_URL="$API_WIN"
          fi

          echo "mac_url=$MAC_URL" >> "$GITHUB_OUTPUT"
          echo "win_url=$WIN_URL" >> "$GITHUB_OUTPUT"

          echo "✓ Release: $TAG"
          echo "  macOS:   $MAC_URL"
          echo "  Windows: $WIN_URL"

      - name: Update download links in docs/index.html
        run: |
          FILE="docs/index.html"
          MAC_URL="${{ steps.release.outputs.mac_url }}"
          WIN_URL="${{ steps.release.outputs.win_url }}"
          TAG="${{ steps.release.outputs.tag }}"

          if [ ! -f "$FILE" ]; then
            echo "::error::docs/index.html not found"
            exit 1
          fi

          # Update links by matching lines with the id, then replacing href on that line
          sed -i '/id="download-mac-hero"/s|href="[^"]*"|href="'"$MAC_URL"'"|' "$FILE"
          sed -i '/id="download-mac-cta"/s|href="[^"]*"|href="'"$MAC_URL"'"|' "$FILE"
          sed -i '/id="download-win-hero"/s|href="[^"]*"|href="'"$WIN_URL"'"|' "$FILE"
          sed -i '/id="download-win-cta"/s|href="[^"]*"|href="'"$WIN_URL"'"|' "$FILE"

          echo "=== Verify updated links ==="
          grep -n 'id="download-' "$FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet docs/; then
            echo "No changes to docs/ — skipping commit."
            exit 0
          fi

          git add docs/
          git commit -m "docs: update download links to ${{ steps.release.outputs.tag }}

          macOS: ${{ steps.release.outputs.mac_url }}
          Windows: ${{ steps.release.outputs.win_url }}"

          git push origin main
          echo "✓ Website updated and pushed."
