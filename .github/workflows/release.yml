# VoiceInk — Manual Release Workflow
# Builds macOS DMG + Windows Setup EXE, then publishes a GitHub Release.
# Trigger: Manual only (workflow_dispatch) — never runs on push/PR.

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        type: string
      create_release:
        description: 'Create GitHub Release with artifacts'
        required: true
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Build macOS (Apple Silicon) ──────────────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: macos
        run: pod install

      - name: Build macOS release
        run: flutter build macos --release

      - name: Code sign (ad-hoc)
        run: |
          APP_BUNDLE=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" | head -1)
          echo "Signing: $APP_BUNDLE"
          codesign --deep --force --sign - "$APP_BUNDLE"

      - name: Create DMG
        run: |
          brew install create-dmg
          APP_NAME="VoiceInk"
          DMG_NAME="${APP_NAME}-macOS-arm64.dmg"
          APP_BUNDLE=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" | head -1)
          APP_BASENAME=$(basename "$APP_BUNDLE")

          create-dmg \
            --volname "$APP_NAME" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$APP_BASENAME" 175 190 \
            --app-drop-link 425 190 \
            "$DMG_NAME" \
            "$APP_BUNDLE" || true

          # Fallback to ZIP if DMG creation failed
          if [ ! -f "$DMG_NAME" ]; then
            echo "DMG creation failed, creating ZIP instead..."
            cd build/macos/Build/Products/Release
            zip -r "${GITHUB_WORKSPACE}/${APP_NAME}-macOS-arm64.zip" "$APP_BASENAME"
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            VoiceInk-macOS-arm64.dmg
            VoiceInk-macOS-arm64.zip
          if-no-files-found: error
          retention-days: 5

  # ── Build Windows (x64) + Installer ─────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Find build output
        id: build-path
        shell: pwsh
        run: |
          if (Test-Path "build\windows\x64\runner\Release") {
            echo "release_dir=build\windows\x64\runner\Release" >> $env:GITHUB_OUTPUT
          } elseif (Test-Path "build\windows\runner\Release") {
            echo "release_dir=build\windows\runner\Release" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "Build output not found!"
            exit 1
          }

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Extract version number
        id: version
        shell: pwsh
        run: |
          $ver = "${{ inputs.version }}" -replace '^v',''
          echo "semver=$ver" >> $env:GITHUB_OUTPUT

      - name: Build installer EXE
        shell: pwsh
        run: |
          $releaseDir = "${{ steps.build-path.outputs.release_dir }}"
          $absReleaseDir = (Resolve-Path $releaseDir).Path
          iscc /DMyAppVersion="${{ steps.version.outputs.semver }}" /DSourceDir="$absReleaseDir" "windows\installer\setup.iss"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: VoiceInk-Windows-x64-Setup.exe
          if-no-files-found: error
          retention-days: 5

  # ── Create GitHub Release ───────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    # Run if at least one build succeeded AND release was requested
    if: >-
      always() &&
      inputs.create_release &&
      (needs.build-macos.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag if missing
        run: |
          TAG="${{ inputs.version }}"
          if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "VoiceInk $TAG"
            git push origin "$TAG"
            echo "✓ Created and pushed tag $TAG"
          else
            echo "Tag $TAG already exists"
          fi

      - name: Download macOS artifacts
        if: needs.build-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts/macos

      - name: Download Windows artifacts
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: List artifacts
        run: find artifacts -type f -ls 2>/dev/null || echo "No artifacts found"

      - name: Collect release files
        id: files
        run: |
          RELEASE_FILES=""

          MACOS=$(find artifacts/macos -type f \( -name "*.dmg" -o -name "*.zip" \) 2>/dev/null | head -1 || true)
          WIN=$(find artifacts/windows -type f -name "*.exe" 2>/dev/null | head -1 || true)

          MACOS_NAME="N/A"
          WIN_NAME="N/A"

          if [ -n "$MACOS" ] && [ -f "$MACOS" ]; then
            RELEASE_FILES="$RELEASE_FILES
          $MACOS"
            MACOS_NAME=$(basename "$MACOS")
            echo "✓ macOS: $MACOS_NAME"
          fi

          if [ -n "$WIN" ] && [ -f "$WIN" ]; then
            RELEASE_FILES="$RELEASE_FILES
          $WIN"
            WIN_NAME=$(basename "$WIN")
            echo "✓ Windows: $WIN_NAME"
          fi

          {
            echo "files<<FILESEOF"
            echo "$RELEASE_FILES"
            echo "FILESEOF"
          } >> "$GITHUB_OUTPUT"
          echo "macos_name=$MACOS_NAME" >> "$GITHUB_OUTPUT"
          echo "windows_name=$WIN_NAME" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.version }}
          name: VoiceInk ${{ inputs.version }}
          draft: false
          prerelease: false
          make_latest: true
          body: |
            # VoiceInk ${{ inputs.version }}

            **Local, on-device voice dictation for macOS & Windows** — 100% free, 100% private.

            ## Downloads

            | Platform | File | Requirements |
            |----------|------|--------------|
            | 🍎 macOS | `${{ steps.files.outputs.macos_name }}` | Apple Silicon (M1/M2/M3/M4), macOS 12.0+ |
            | 🪟 Windows | `${{ steps.files.outputs.windows_name }}` | Windows 10/11, 64-bit |

            ## macOS Installation

            1. Download and open the DMG
            2. Drag the app to Applications
            3. **First launch:** Right-click the app → Open → Open

            ## Windows Installation

            1. Download and run `${{ steps.files.outputs.windows_name }}`
            2. Follow the setup wizard
            3. Launch VoiceInk from the Start Menu or Desktop shortcut

            ## Highlights

            - Push-to-talk voice dictation with configurable hotkeys
            - 9 Whisper AI models (75 MB to 1.6 GB)
            - 34 language support
            - Custom dictionary with auto-correction
            - Writing styles (Verbatim, Clean, Formal, Chat)
            - Stats & streaks tracking
            - 100% offline — no data ever leaves your device
            - No accounts, no ads, no analytics
          files: ${{ steps.files.outputs.files }}
