# VoiceInk — Release Workflow
#
# Flow:
#   1. Developer runs `bash publish.sh` on macOS:
#      - Builds macOS DMG locally
#      - Uploads DMG to the 'local-builds' staging release (clears old versions first)
#      - Commits version bump, pushes git tag  ←  triggers THIS workflow
#
#   2. This workflow (triggered by the tag push):
#      - Builds Windows installer on a GitHub-hosted Windows runner
#      - Downloads the exact-version macOS DMG from 'local-builds'
#      - Creates the public GitHub Release with both artifacts
#      - Calls update-website to refresh the download links on the website
#
# Can also be triggered manually via workflow_dispatch (macOS must already be
# uploaded to local-builds for the given version).

name: Release

on:
  push:
    tags:
      - 'v[0-9]*'         # e.g. v1.0.0, v2.3.1
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0) — macOS DMG must already be in local-builds release'
        required: true
        type: string

# Never cancel a running release mid-flight.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ── Build Windows installer on GitHub's Windows runner ──────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $tag = if ('${{ inputs.version }}' -ne '') { '${{ inputs.version }}' } else { '${{ github.ref_name }}' }
          $ver = $tag -replace '^v', ''
          "tag=$tag"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "semver=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version $ver (tag: $tag)"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release --build-name="${{ steps.version.outputs.semver }}"

      - name: Find build output directory
        id: build-path
        shell: pwsh
        run: |
          if (Test-Path "build\windows\x64\runner\Release") {
            "release_dir=build\windows\x64\runner\Release" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } elseif (Test-Path "build\windows\runner\Release") {
            "release_dir=build\windows\runner\Release" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            Write-Error "Windows build output not found!"
            exit 1
          }

      # ── Bundle whisper-cli.exe ─────────────────────────────────────────────
      # The app expects whisper-cli.exe at: <release_dir>\data\whisper.cpp\bin\whisper-cli.exe
      # Try 1: Download the pre-cross-compiled binary from local-builds (fastest).
      # Try 2: If not available, compile whisper.cpp natively on this Windows runner.
      - name: Download whisper-cli.exe from local-builds (if available)
        id: download-whisper
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ver = "${{ steps.version.outputs.semver }}"
          $artifact = "VoiceInk-${ver}-whisper-windows-x64.zip"
          $tmpDir = "tmp-whisper"
          New-Item -ItemType Directory -Force -Path $tmpDir | Out-Null

          Write-Host "Trying to download ${artifact} from local-builds..."
          $result = gh release download local-builds `
            --repo "${{ github.repository }}" `
            --pattern $artifact `
            --dir $tmpDir 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "✓ Downloaded ${artifact}"
            "found=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "zip_path=${tmpDir}\${artifact}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            Write-Host "Not found in local-builds — will compile on runner."
            "found=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Compile whisper-cli.exe on runner (fallback)
        if: steps.download-whisper.outputs.found != 'true'
        shell: pwsh
        run: |
          Write-Host "Installing CMake and git..."
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y --no-progress
          refreshenv

          Write-Host "Cloning whisper.cpp..."
          git clone --depth 1 --branch v1.7.4 https://github.com/ggerganov/whisper.cpp.git tmp-whisper-src
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Tag v1.7.4 not found, cloning main..."
            git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git tmp-whisper-src
          }

          Write-Host "Building whisper-cli..."
          New-Item -ItemType Directory -Force -Path tmp-whisper-src\build | Out-Null
          Push-Location tmp-whisper-src\build
          cmake .. -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_EXAMPLES=ON
          cmake --build . --config Release --target whisper-cli
          Pop-Location

          $exe = Get-ChildItem -Path tmp-whisper-src\build -Filter "whisper-cli.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Error "whisper-cli.exe not found after build!"; exit 1 }

          New-Item -ItemType Directory -Force -Path "tmp-whisper" | Out-Null
          Copy-Item $exe.FullName "tmp-whisper\whisper-cli.exe"
          Write-Host "✓ Compiled whisper-cli.exe"
          # Create a ZIP to match the extraction step below
          Compress-Archive -Path "tmp-whisper\whisper-cli.exe" -DestinationPath "tmp-whisper\fallback.zip"
          "zip_path=tmp-whisper\fallback.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: compile-whisper

      - name: Bundle whisper-cli.exe into Flutter build output
        shell: pwsh
        run: |
          $releaseDir = "${{ steps.build-path.outputs.release_dir }}"
          $destDir    = "${releaseDir}\data\whisper.cpp\bin"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null

          # Determine the ZIP source (downloaded or compiled fallback)
          $zipPath = "${{ steps.download-whisper.outputs.zip_path }}"
          if (-not $zipPath) { $zipPath = "${{ steps.compile-whisper.outputs.zip_path }}" }

          if ($zipPath -and (Test-Path $zipPath)) {
            Expand-Archive -Path $zipPath -DestinationPath $destDir -Force
            Write-Host "✓ Extracted from ZIP: $zipPath → $destDir"
          } elseif (Test-Path "tmp-whisper\whisper-cli.exe") {
            Copy-Item "tmp-whisper\whisper-cli.exe" $destDir
            Write-Host "✓ Copied whisper-cli.exe → $destDir"
          } else {
            Write-Error "No whisper-cli.exe available to bundle!"
            exit 1
          }

          $bundled = Join-Path $destDir "whisper-cli.exe"
          if (Test-Path $bundled) {
            Write-Host "✓ whisper-cli.exe bundled at: $bundled"
            Write-Host "  Size: $((Get-Item $bundled).Length / 1MB) MB"
          } else {
            Write-Error "whisper-cli.exe missing from expected path!"
            exit 1
          }
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer EXE
        shell: pwsh
        run: |
          $releaseDir = (Resolve-Path "${{ steps.build-path.outputs.release_dir }}").Path
          $ver        = "${{ steps.version.outputs.semver }}"
          $outName    = "VoiceInk-${ver}-Windows-x64-Setup"
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" `
              "/DMyAppVersion=$ver" `
              "/DSourceDir=$releaseDir" `
              "/DMyOutputFilename=$outName" `
              "windows\installer\setup.iss"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: VoiceInk-*-Windows-x64-Setup.exe
          if-no-files-found: error
          retention-days: 5

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    needs: [build-windows]
    if: needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          TAG="${{ inputs.version }}"
          [ -z "$TAG" ] && TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          echo "tag=$TAG"    >> "$GITHUB_OUTPUT"
          echo "semver=$VER" >> "$GITHUB_OUTPUT"
          echo "Creating release $TAG (version: $VER)"

      - name: Ensure tag exists
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "VoiceInk $TAG"
            git push origin "$TAG"
            echo "✓ Created and pushed tag $TAG"
          else
            echo "Tag $TAG already exists — OK"
          fi

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: Download macOS build from local-builds
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts/macos
          VER="${{ steps.version.outputs.semver }}"

          # Download the EXACT version — never use a wildcard to avoid picking up
          # stale files from previous releases that may still be in local-builds.
          echo "Downloading VoiceInk-${VER}-macOS-arm64.dmg from local-builds..."
          if gh release download local-builds \
              --repo "${{ github.repository }}" \
              --pattern "VoiceInk-${VER}-macOS-arm64.dmg" \
              --dir artifacts/macos 2>/dev/null; then
            echo "✓ macOS DMG downloaded"
          else
            echo "DMG not found — trying ZIP fallback..."
            gh release download local-builds \
              --repo "${{ github.repository }}" \
              --pattern "VoiceInk-${VER}-macOS-arm64.zip" \
              --dir artifacts/macos || {
                echo "::error::No macOS build for version ${VER} found in the local-builds release."
                echo "::error::On macOS, run:  bash publish.sh  and choose option 3 to upload the build first."
                exit 1
              }
          fi
          ls -lh artifacts/macos/

      - name: Collect release files
        id: files
        run: |
          VER="${{ steps.version.outputs.semver }}"

          # Match only the exact version — never rely on alphabetical sort.
          MACOS_FILE=$(find artifacts/macos -type f \
              \( -name "VoiceInk-${VER}-macOS-arm64.dmg" \
              -o -name "VoiceInk-${VER}-macOS-arm64.zip" \) | head -1 || true)
          WIN_FILE=$(find artifacts/windows -type f -name "VoiceInk-${VER}-Windows-x64-Setup.exe" \
              2>/dev/null | head -1 || true)

          FILES=""
          MACOS_NAME="N/A"
          WIN_NAME="N/A"

          if [ -n "$MACOS_FILE" ] && [ -f "$MACOS_FILE" ]; then
            MACOS_NAME=$(basename "$MACOS_FILE")
            FILES="$MACOS_FILE"
            echo "✓ macOS: $MACOS_NAME"
          else
            echo "::error::macOS artifact not found for version ${VER}!"
            exit 1
          fi

          if [ -n "$WIN_FILE" ] && [ -f "$WIN_FILE" ]; then
            WIN_NAME=$(basename "$WIN_FILE")
            FILES=$(printf '%s\n%s' "$FILES" "$WIN_FILE")
            echo "✓ Windows: $WIN_NAME"
          else
            echo "::warning::Windows EXE not found — release will be macOS-only"
          fi

          {
            echo "files<<FILESEOF"
            echo "$FILES"
            echo "FILESEOF"
          } >> "$GITHUB_OUTPUT"
          echo "macos_name=$MACOS_NAME" >> "$GITHUB_OUTPUT"
          echo "windows_name=$WIN_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: VoiceInk ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          make_latest: true
          body: |
            # VoiceInk ${{ steps.version.outputs.tag }}

            **Local, on-device voice dictation for macOS & Windows** — 100% free, 100% private.

            ## Downloads

            | Platform | File | Requirements |
            |----------|------|--------------|
            | 🍎 macOS | `${{ steps.files.outputs.macos_name }}` | Apple Silicon (M1/M2/M3/M4), macOS 12.0+ |
            | 🪟 Windows | `${{ steps.files.outputs.windows_name }}` | Windows 10/11, 64-bit |

            ## macOS Installation

            1. Download and open the DMG
            2. Drag the app to Applications
            3. **First launch:** Right-click the app → Open → Open

            ## Windows Installation

            1. Download and run `${{ steps.files.outputs.windows_name }}`
            2. Follow the setup wizard
            3. Launch VoiceInk from the Start Menu or Desktop shortcut

            ## Highlights

            - Push-to-talk voice dictation with configurable hotkeys
            - 9 Whisper AI models (75 MB to 1.6 GB)
            - 34 language support
            - Custom dictionary with auto-correction
            - Writing styles (Verbatim, Clean, Formal, Chat)
            - Stats & streaks tracking
            - 100% offline — no data ever leaves your device
            - No accounts, no ads, no analytics
          files: ${{ steps.files.outputs.files }}

  # ── Update website download links ──────────────────────────────────────────
  update-website:
    needs: [release]
    if: needs.release.result == 'success'
    uses: ./.github/workflows/update-website.yml
    with:
      release_tag: ${{ needs.release.outputs.tag }}
    secrets: inherit
