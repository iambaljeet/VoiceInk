# VoiceInk — Manual Release Workflow
# Builds macOS DMG + Windows Setup EXE, then publishes a GitHub Release.
# Supports: CI builds, local pre-uploaded builds, or mix of both.
# Trigger: Manual only (workflow_dispatch) — never runs on push/PR.

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        type: string
      create_release:
        description: 'Create GitHub Release with artifacts'
        required: true
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS DMG in CI'
        type: boolean
        default: true
      build_windows:
        description: 'Build Windows EXE in CI'
        type: boolean
        default: true
      use_local_macos:
        description: 'Use pre-uploaded macOS build (from local-builds tag)'
        type: boolean
        default: false
      use_local_windows:
        description: 'Use pre-uploaded Windows build (from local-builds tag)'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Build macOS (Apple Silicon) ──────────────────────────────────────────
  build-macos:
    if: inputs.build_macos && !inputs.use_local_macos
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: macos
        run: pod install

      - name: Patch Swift concurrency for Xcode 16+
        working-directory: macos
        run: |
          echo "Patching all Pod xcconfig files for SWIFT_STRICT_CONCURRENCY..."
          find Pods/Target\ Support\ Files -name '*.xcconfig' | while IFS= read -r f; do
            if ! grep -q 'SWIFT_STRICT_CONCURRENCY' "$f"; then
              echo 'SWIFT_STRICT_CONCURRENCY = minimal' >> "$f"
              echo "  Patched: $f"
            fi
          done
          echo "Done."

      - name: Extract version number
        id: version
        run: |
          VER="${{ inputs.version }}"
          VER="${VER#v}"
          echo "semver=$VER" >> "$GITHUB_OUTPUT"

      - name: Build macOS release
        run: flutter build macos --release

      - name: Code sign (ad-hoc)
        run: |
          APP_BUNDLE=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: No .app bundle found!"
            exit 1
          fi
          echo "Signing: $APP_BUNDLE"
          codesign --deep --force --sign - "$APP_BUNDLE"

      - name: Create DMG
        run: |
          brew install create-dmg
          APP_NAME="VoiceInk"
          VER="${{ steps.version.outputs.semver }}"
          DMG_NAME="${APP_NAME}-${VER}-macOS-arm64.dmg"
          APP_BUNDLE=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" | head -1)
          APP_BASENAME=$(basename "$APP_BUNDLE")

          create-dmg \
            --volname "$APP_NAME" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$APP_BASENAME" 175 190 \
            --app-drop-link 425 190 \
            "$DMG_NAME" \
            "$APP_BUNDLE" || true

          # Fallback to ZIP if DMG creation failed
          if [ ! -f "$DMG_NAME" ]; then
            echo "::warning::DMG creation failed, creating ZIP instead"
            cd build/macos/Build/Products/Release
            zip -r "${GITHUB_WORKSPACE}/${APP_NAME}-${VER}-macOS-arm64.zip" "$APP_BASENAME"
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            VoiceInk-*-macOS-arm64.dmg
            VoiceInk-*-macOS-arm64.zip
          if-no-files-found: error
          retention-days: 5

  # ── Build Windows (x64) + Installer ─────────────────────────────────────
  build-windows:
    if: inputs.build_windows && !inputs.use_local_windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Find build output
        id: build-path
        shell: pwsh
        run: |
          if (Test-Path "build\windows\x64\runner\Release") {
            echo "release_dir=build\windows\x64\runner\Release" >> $env:GITHUB_OUTPUT
          } elseif (Test-Path "build\windows\runner\Release") {
            echo "release_dir=build\windows\runner\Release" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "Build output not found!"
            exit 1
          }

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Extract version number
        id: version
        shell: pwsh
        run: |
          $ver = "${{ inputs.version }}" -replace '^v',''
          echo "semver=$ver" >> $env:GITHUB_OUTPUT

      - name: Build installer EXE
        shell: pwsh
        run: |
          $releaseDir = "${{ steps.build-path.outputs.release_dir }}"
          $absReleaseDir = (Resolve-Path $releaseDir).Path
          $ver = "${{ steps.version.outputs.semver }}"
          & "iscc" "/DMyAppVersion=$ver" "/DSourceDir=$absReleaseDir" "/DMyOutputFilename=VoiceInk-$ver-Windows-x64-Setup" "windows\installer\setup.iss"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: VoiceInk-*-Windows-x64-Setup.exe
          if-no-files-found: error
          retention-days: 5

  # ── Create GitHub Release ───────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    if: |
      always() &&
      inputs.create_release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version number
        id: version
        run: |
          VER="${{ inputs.version }}"
          VER="${VER#v}"
          echo "semver=$VER" >> "$GITHUB_OUTPUT"

      - name: Create tag if missing
        run: |
          TAG="${{ inputs.version }}"
          if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "VoiceInk $TAG"
            git push origin "$TAG"
            echo "✓ Created and pushed tag $TAG"
          else
            echo "Tag $TAG already exists"
          fi

      - name: Download CI macOS artifacts
        if: inputs.build_macos && !inputs.use_local_macos && needs.build-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts/macos
        continue-on-error: true

      - name: Download CI Windows artifacts
        if: inputs.build_windows && !inputs.use_local_windows && needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows
        continue-on-error: true

      - name: Download local macOS build
        if: inputs.use_local_macos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts/macos
          echo "Downloading macOS build from 'local-builds' release..."
          if gh release download local-builds \
              --repo "${{ github.repository }}" \
              --pattern "VoiceInk-*-macOS-arm64.*" \
              --dir artifacts/macos 2>/dev/null; then
            echo "✓ Downloaded local macOS build"
            ls -la artifacts/macos/
          else
            echo "::warning::No macOS build found in 'local-builds' release"
          fi

      - name: Download local Windows build
        if: inputs.use_local_windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts/windows
          echo "Downloading Windows build from 'local-builds' release..."
          if gh release download local-builds \
              --repo "${{ github.repository }}" \
              --pattern "VoiceInk-*-Windows-x64-Setup.*" \
              --dir artifacts/windows 2>/dev/null; then
            echo "✓ Downloaded local Windows build"
            ls -la artifacts/windows/
          else
            echo "::warning::No Windows build found in 'local-builds' release"
          fi

      - name: List artifacts
        run: |
          echo "=== Artifact contents ==="
          find artifacts -type f -ls 2>/dev/null || echo "No artifacts directory"

      - name: Collect release files
        id: files
        run: |
          MACOS_FILE=$(find artifacts/macos -type f \( -name "*.dmg" -o -name "*.zip" \) 2>/dev/null | head -1 || true)
          WIN_FILE=$(find artifacts/windows -type f -name "*.exe" 2>/dev/null | head -1 || true)

          MACOS_NAME="N/A"
          WIN_NAME="N/A"
          FILES=""

          if [ -n "$MACOS_FILE" ] && [ -f "$MACOS_FILE" ]; then
            MACOS_NAME=$(basename "$MACOS_FILE")
            FILES="$MACOS_FILE"
            echo "✓ macOS artifact: $MACOS_NAME"
          fi

          if [ -n "$WIN_FILE" ] && [ -f "$WIN_FILE" ]; then
            WIN_NAME=$(basename "$WIN_FILE")
            if [ -n "$FILES" ]; then
              FILES=$(printf '%s\n%s' "$FILES" "$WIN_FILE")
            else
              FILES="$WIN_FILE"
            fi
            echo "✓ Windows artifact: $WIN_NAME"
          fi

          if [ -z "$FILES" ]; then
            echo "::error::No release artifacts found!"
            exit 1
          fi

          {
            echo "files<<FILESEOF"
            echo "$FILES"
            echo "FILESEOF"
          } >> "$GITHUB_OUTPUT"
          echo "macos_name=$MACOS_NAME" >> "$GITHUB_OUTPUT"
          echo "windows_name=$WIN_NAME" >> "$GITHUB_OUTPUT"

          echo "=== Files to upload ==="
          echo "$FILES"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.version }}
          name: VoiceInk ${{ inputs.version }}
          draft: false
          prerelease: false
          make_latest: true
          body: |
            # VoiceInk ${{ inputs.version }}

            **Local, on-device voice dictation for macOS & Windows** — 100% free, 100% private.

            ## Downloads

            | Platform | File | Requirements |
            |----------|------|--------------|
            | 🍎 macOS | `${{ steps.files.outputs.macos_name }}` | Apple Silicon (M1/M2/M3/M4), macOS 12.0+ |
            | 🪟 Windows | `${{ steps.files.outputs.windows_name }}` | Windows 10/11, 64-bit |

            ## macOS Installation

            1. Download and open the DMG
            2. Drag the app to Applications
            3. **First launch:** Right-click the app → Open → Open

            ## Windows Installation

            1. Download and run `${{ steps.files.outputs.windows_name }}`
            2. Follow the setup wizard
            3. Launch VoiceInk from the Start Menu or Desktop shortcut

            ## Highlights

            - Push-to-talk voice dictation with configurable hotkeys
            - 9 Whisper AI models (75 MB to 1.6 GB)
            - 34 language support
            - Custom dictionary with auto-correction
            - Writing styles (Verbatim, Clean, Formal, Chat)
            - Stats & streaks tracking
            - 100% offline — no data ever leaves your device
            - No accounts, no ads, no analytics
          files: ${{ steps.files.outputs.files }}

  # ── Update Website Download Links ──────────────────────────────────────
  update-website:
    needs: [release]
    if: needs.release.result == 'success'
    uses: ./.github/workflows/update-website.yml
    with:
      release_tag: ${{ inputs.version }}
    secrets: inherit
